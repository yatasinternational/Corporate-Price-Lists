<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yataş International Experience Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: url('image_26c6be.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: #fff;
            perspective: 1500px; /* 3D Sayfa geçiş efekti için */
        }
        
        #globalLoading { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #070d22; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; letter-spacing: 1px;
        }

        .portal-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* PREMIUM FOCUS MODE LOGO ELEMENTI */
        #focusLogo {
            position: fixed;
            top: 25px;
            left: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 500;
            display: none;
            text-transform: uppercase;
            border-left: 3px solid #fff;
            padding-left: 10px;
            animate: fadeIn 0.5s ease;
        }

        /* SOL PANEL: YATAŞ KURUMSAL BANNER */
        .sidebar-nav {
            width: 320px;
            background: #002870; /* Yataş Kurumsal Lacivert */
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            z-index: 200;
            overflow-y: auto;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .logo-container {
            width: 100%;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .brand-subtitle {
            font-size: 11px;
            color: #a4c2f4;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        /* SMART SEARCH INPUT (iOS SPOTLIGHT STYLE) */
        .search-container {
            position: relative;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 12px;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .menu-section-title {
            font-size: 13px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 15px;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #ffffff;
            padding-top: 2px;
            padding-bottom: 2px;
        }

        .deck-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .deck-btn {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #ffffff;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.23s ease-in-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .deck-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        .deck-btn.active-deck {
            background: #ffffff;
            border-color: #ffffff;
            color: #002870; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .deck-btn::before {
            content: "•";
            color: #fff;
            font-size: 16px;
        }
        .deck-btn.active-deck::before {
            color: #002870;
        }

        /* WORKSPACE */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            position: relative;
            background: rgba(7, 13, 34, 0.35);
            transition: all 0.5s ease;
        }

        .main-container {
            display: flex;
            width: 98%;
            flex: 1;
            overflow: hidden;
            gap: 15px;
        }
        
        .scene {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .pan-zoom-container {
            position: absolute;
            display: none;
            cursor: grab;
            transform-origin: center center;
            will-change: transform;
            z-index: 10;
        }
        .pan-zoom-container:active { cursor: grabbing; }
        
        .book {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }
        
        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            display: none;
            transform-origin: left center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            backface-visibility: hidden;
        }
        
        .page.active-page {
            display: block;
            opacity: 1;
            transform: rotateY(0deg);
        }

        /* 3D Page Turn Sınıfları */
        .page.turn-next {
            transform: rotateY(-30deg) scale(0.95);
            opacity: 0;
        }
        .page.turn-prev {
            transform: rotateY(30deg) scale(0.95);
            opacity: 0;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            box-shadow: 0 25px 65px rgba(0,0,0,0.8);
            border-radius: 6px;
        }

        /* PREMIUM GEÇİŞ OKLARI */
        .nav-overlay-zone {
            position: absolute;
            top: 0; height: 100%; width: 100px;
            z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-overlay-zone.left-zone { left: 0; }
        .nav-overlay-zone.right-zone { right: 0; }

        .arrow-btn {
            width: 50px; height: 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px; cursor: pointer;
            opacity: 0.35; transition: all 0.25s ease-in-out;
            backdrop-filter: blur(5px);
            user-select: none;
        }
        .nav-overlay-zone:hover { cursor: pointer; }
        .nav-overlay-zone:hover .arrow-btn { opacity: 0.75; background: rgba(0, 0, 0, 0.7); }
        .arrow-btn:hover {
            opacity: 1 !important; transform: scale(1.1);
            background: #ffffff !important; color: #000000 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }
        
        /* SAĞ PANEL: SLAYT ŞERİDİ */
        .sidebar-thumbnails {
            width: 200px;
            background: rgba(0, 40, 112, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px 10px;
            backdrop-filter: blur(15px);
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        .sidebar-thumbnails::-webkit-scrollbar { width: 5px; }
        .sidebar-thumbnails::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .thumb-box {
            position: relative; width: 92%; cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 6px;
            overflow: hidden; transition: all 0.2s ease-in-out; opacity: 0.5;
            background: rgba(255, 255, 255, 0.05); flex-shrink: 0;
        }
        .thumb-box:hover { opacity: 0.8; border-color: rgba(255,255,255,0.5); }
        .thumb-box.active-thumb { border-color: #ffffff; opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,0.5); }
        .thumb-box canvas { width: 100% !important; height: auto !important; display: block; }

        .thumb-label {
            position: absolute; bottom: 4px; right: 6px;
            background: rgba(0,0,0,0.8); color: #fff; font-size: 10px;
            font-weight: bold; padding: 1px 5px; border-radius: 3px;
        }
        
        /* ALT PANEL */
        .bottom-bar-area {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 6px;
            padding-top: 10px; flex-shrink: 0; z-index: 100;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        .controls {
            display: flex; align-items: center; gap: 15px; 
            background: rgba(0, 40, 112, 0.85); padding: 10px 25px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 35px rgba(0,0,0,0.6);
        }
        
        .bottom-bar-area button {
            padding: 8px 18px; font-size: 12px; font-weight: bold; cursor: pointer;
            background: #fff; color: #002870; border: none; border-radius: 25px;
            transition: all 0.2s;
        }
        .bottom-bar-area button:hover { background: #e5e5e5; }
        .bottom-bar-area button:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .goto-container { display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .goto-input {
            width: 40px; padding: 3px 5px; border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4);
            color: #fff; text-align: center; font-weight: bold;
        }
        #pageIndicator { color: #ffffff; }
        
        .hint { 
            font-size: 12px; 
            color: #ffffff !important; 
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }

        /* LIQUID GLASS FOCUS & AUDIO CONTROL BUTTONS */
        .premium-actions {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10001;
        }
        .premium-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 16px;
            border-radius: 30px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .premium-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        .premium-btn.active {
            background: #fff;
            color: #002870;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* AUTO RESUME ENG TOAST NOTIFICATION */
        #resumeToast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 40, 112, 0.95);
            border-left: 4px solid #ffffff;
            padding: 15px 25px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10005;
            display: none;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #resumeToast.show {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }

        /* FOCUS MODE ACTIVE STATE HIDERS */
        .focus-mode-on .sidebar-nav { transform: translateX(-320px); opacity: 0; pointer-events: none; }
        .focus-mode-on .sidebar-thumbnails { transform: translateX(200px); opacity: 0; pointer-events: none; }
        .focus-mode-on .bottom-bar-area { transform: translateY(150px); opacity: 0; pointer-events: none; }
        .focus-mode-on #focusLogo { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="">

    <div id="globalLoading">Yataş International Price Catalogues are launching...</div>
    
    <!-- PREMIUM TOP ACTION BAR -->
    <div class="premium-actions">
        <button id="audioToggleBtn" class="premium-btn">🔊 Sound On</button>
        <button id="focusModeBtn" class="premium-btn">✨ Focus Mode</button>
    </div>

    <!-- AUTO RESUME ENG TOAST -->
    <div id="resumeToast">Welcome back! You're being redirected to your last viewed page.</div>
    <div id="focusLogo">Yataş Group</div>
    
    <div class="portal-wrapper" id="portalWrapper">
        
        <!-- SOL BANNER: KATEGORİZASYONLU YATAŞ MENÜSÜ -->
        <div class="sidebar-nav" id="sidebarNav">
            <div class="logo-container">
                <img src="image_26c641.png" alt="Yataş Grup Logo">
            </div>
            <div class="brand-subtitle">yataş ınternatıonal</div>
            
            <!-- SMART SEARCH BAR -->
            <div class="search-container">
                <input type="text" id="smartSearch" class="search-input" placeholder="Search catalogues...">
            </div>

            <!-- 1. ANA BAŞLIK: CATALOGUES -->
            <div class="menu-section-title">Catalogues</div>
            <ul class="deck-list" id="cataloguesList"></ul>

            <!-- 2. ANA BAŞLIK: DOWNLOAD LINKS -->
            <div class="menu-section-title">Download Lınks</div>
            <ul class="deck-list" id="downloadList"></ul>
        </div>

        <!-- WORKSPACE -->
        <div class="workspace" id="workspace">
            <div class="main-container" id="mainContainer">
                <div class="scene" id="scene">
                    
                    <div id="zoomContainer" class="pan-zoom-container">
                        <div id="book" class="book"></div>
                    </div>

                    <div class="nav-overlay-zone left-zone" id="zoneLeft">
                        <div class="arrow-btn" id="overlayPrevBtn">&#10094;</div>
                    </div>

                    <div class="nav-overlay-zone right-zone" id="zoneRight">
                        <div class="arrow-btn" id="overlayNextBtn">&#10095;</div>
                    </div>

                </div>

                <div class="sidebar-thumbnails" id="sidebarThumbnails"></div>
            </div>

            <!-- KONTROLLER -->
            <div class="bottom-bar-area" id="bottomBarArea">
                <div class="controls">
                    <button id="prevBtn" disabled>◀ Previous</button>
                    <div class="goto-container">
                        <input type="text" id="gotoInput" class="goto-input" value="1">
                        <span id="pageIndicator">/ 0</span>
                    </div>
                    <button id="nextBtn">Next ▶</button>
                    <button id="zoomInBtn">🔍 +</button>
                    <button id="zoomOutBtn">🔍 -</button>
                </div>
                <div class="hint">Use your mouse wheel to zoom in/out on the slide area.</div>
            </div>
        </div>

    </div>

    <script>
        const presentationData = {
            catalogues: [
                { title: "Yataş Bedding July 2026 USD", url: "BEDDING_JULY2026_DOLAR_HIGH.pdf" },
                { title: "Yataş Bedding July 2026 EUR", url: "BEDDING_JULY2026_EURO_HIGH.pdf" }
            ],
            downloadLinks: [
                { title: "YB July 2026 USD High Resolution", url: "https://we.tl/t-hHbsYtkAQv63LRYm", isLink: true },
                { title: "YB July 2026 EUR High Resolution", url: "https://we.tl/t-xABOnqmf2pMj3dhK", isLink: true }
            ]
        };

        const presentations = [...presentationData.catalogues, ...presentationData.downloadLinks];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentActivePresentationIndex = 0;
        let currentId = 0; 
        let pages = [];
        let thumbElements = [];
        let pdfDoc = null;
        let scale = 1; let posX = 0; let posY = 0;
        let isDragging = false; let startX; let startY;
        let isSoundOn = true;
        
        // Hangi sayfaların render aşamasında olduğunu korumak için havuz
        let pageRenderingStates = {}; 

        const zoomContainer = document.getElementById('zoomContainer');
        const book = document.getElementById('book');
        const scene = document.getElementById('scene');
        const sidebarThumbnails = document.getElementById('sidebarThumbnails');
        const gotoInput = document.getElementById('gotoInput');
        const cataloguesList = document.getElementById('cataloguesList');
        const downloadList = document.getElementById('downloadList');
        const globalLoading = document.getElementById('globalLoading');

        // AUDIO ENGINE: Dışarıdan dosya yüklemeden premium kağıt sesi üretir
        function playPaperSound() {
            if (!isSoundOn) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const bufferSize = ctx.sampleRate * 0.4;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const whiteNoise = ctx.createBufferSource();
                whiteNoise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(1000, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
                filter.Q.setValueAtTime(3, ctx.currentTime);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                whiteNoise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                whiteNoise.start();
            } catch (e) { console.log("Audio playing pending user gesture interaction."); }
        }

        // PREMIUM WATERMARK ENGINE
        function injectWatermark(context, width, height) {
            context.save();
            context.font = "bold " + Math.floor(width / 22) + "px 'Segoe UI', Arial, sans-serif";
            context.fillStyle = "rgba(255, 255, 255, 0.06)";
            context.textAlign = "center";
            context.textBaseline = "middle";
            context.translate(width / 2, height / 2);
            context.rotate(-Math.PI / 6); // Diagonal 30 derece açıyla basar
            context.fillText("© YATAŞ GROUP - ALL RIGHTS RESERVED", 0, 0);
            context.restore();
        }

        // SMART SEARCH ENGINE (iOS SPOTLIGHT)
        document.getElementById('smartSearch').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.deck-btn').forEach(btn => {
                const text = btn.innerText.toLowerCase();
                if(text.includes(query)) {
                    btn.parentElement.style.display = "block";
                } else {
                    btn.parentElement.style.display = "none";
                }
            });
        });

        // FOCUS MODE CORE
        document.getElementById('focusModeBtn').addEventListener('click', function() {
            this.classList.toggle('active');
            document.body.classList.toggle('focus-mode-on');
            if(document.body.classList.contains('focus-mode-on')) {
                this.innerText = "✨ Normal Mode";
            } else {
                this.innerText = "✨ Focus Mode";
            }
            setTimeout(() => { if (pages[currentId]) updateBookDisplay(); }, 550);
        });

        // AUDIO TOGGLE SWITCH
        document.getElementById('audioToggleBtn').addEventListener('click', function() {
            isSoundOn = !isSoundOn;
            this.classList.toggle('active', !isSoundOn);
            this.innerText = isSoundOn ? "🔊 Sound On" : "🔇 Muted";
        });

        function buildSidebarMenu() {
            cataloguesList.innerHTML = "";
            downloadList.innerHTML = "";
            let globalIdx = 0;

            presentationData.catalogues.forEach((deck) => {
                const currentIdx = globalIdx;
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `deck-btn ${currentIdx === 0 ? 'active-deck' : ''}`;
                btn.innerText = deck.title;
                btn.setAttribute('data-index', currentIdx);
                btn.addEventListener('click', () => switchPresentation(currentIdx));
                li.appendChild(btn);
                cataloguesList.appendChild(li);
                globalIdx++;
            });

            presentationData.downloadLinks.forEach((deck) => {
                const currentIdx = globalIdx;
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `deck-btn`;
                btn.innerText = deck.title;
                btn.setAttribute('data-index', currentIdx);
                btn.addEventListener('click', () => switchPresentation(currentIdx));
                li.appendChild(btn);
                downloadList.appendChild(li);
                globalIdx++;
            });
        }

        async function switchPresentation(index, targetSavedPage = 0) {
            const item = presentations[index];
            if (item.isLink) {
                window.open(item.url, '_blank');
                return;
            }

            currentActivePresentationIndex = index;
            // Auto resume veritabanı kaydı
            localStorage.setItem('yatas_last_presentation', index);

            const buttons = document.querySelectorAll('.deck-btn');
            buttons.forEach(b => {
                const bIdx = parseInt(b.getAttribute('data-index'));
                b.classList.toggle('active-deck', bIdx === index);
            });

            globalLoading.style.display = 'flex';
            globalLoading.innerText = `Loading "${item.title}"...`;

            book.innerHTML = '';
            sidebarThumbnails.innerHTML = '';
            pages = [];
            thumbElements = [];
            currentId = targetSavedPage;
            pageRenderingStates = {};
            resetZoom();

            await loadPDF(item.url);
        }

        function resizeBookToFit(viewport) {
            const sceneW = scene.clientWidth;
            const sceneH = scene.clientHeight;
            const scaleX = (sceneW * 0.94) / viewport.width;
            const scaleY = (sceneH * 0.90) / viewport.height;
            const idealScale = Math.min(scaleX, scaleY);
            book.style.width = Math.floor(viewport.width * idealScale) + 'px';
            book.style.height = Math.floor(viewport.height * idealScale) + 'px';
        }

        // PREDICTIVE LAZY LOADING & RENDER ENGINE (+2 / -2 MIMARISI)
        async function optimizeAndRenderPage(pageNum) {
            if (pageNum < 1 || pageNum > pdfDoc.numPages) return;
            if (pageRenderingStates[pageNum] === 'high-res') return; // Zaten ultra kalitede hazırsa elleme

            try {
                const page = await pdfDoc.getPage(pageNum);
                
                // Eğer sayfa o anki odağın +2/-2 alanındaysa Ultra-Res (3.0), değilse standart (1.2) render et
                const distance = Math.abs((pageNum - 1) - currentId);
                const isHighResTarget = distance <= 2;
                const renderScale = isHighResTarget ? 3.0 : 1.2;

                let pageDiv = pages[pageNum - 1];
                if (!pageDiv) {
                    pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    const canvas = document.createElement('canvas');
                    pageDiv.appendChild(canvas);
                    book.appendChild(pageDiv);
                    pages[pageNum - 1] = pageDiv;
                }

                const canvas = pageDiv.querySelector('canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: renderScale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                pageDiv.pdfViewport = page.getViewport({ scale: 1.0 });
                pageRenderingStates[pageNum] = isHighResTarget ? 'high-res' : 'low-res';

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Filigranı ultra-res katmana kusursuzca işle
                injectWatermark(context, canvas.width, canvas.height);

                if (pageNum - 1 === currentId) {
                    updateBookDisplay();
                }
            } catch (err) { console.error("Predictive engine execution dropped: ", err); }
        }

        // Tahmini önbellek havuzunu sürekli güncel tutan temizlik yöneticisi
        function runPredictiveCachePipeline() {
            const total = pdfDoc.numPages;
            const activeIdx = currentId + 1;

            // Öncelikli olarak mevcut sayfa ve komşularını parlat
            optimizeAndRenderPage(activeIdx);
            for (let i = 1; i <= 2; i++) {
                optimizeAndRenderPage(activeIdx + i);
                optimizeAndRenderPage(activeIdx - i);
            }

            // Bellek temizliği (Garbage Collection): Odaktan çok uzaklaşan sayfaları küçült
            for (let p = 1; p <= total; p++) {
                if (Math.abs((p - 1) - currentId) > 3) {
                    if (pageRenderingStates[p] === 'high-res') {
                        // Hafızayı şişirmemek adına kalitesini düşür ve havuzu rahatlat
                        pageRenderingStates[p] = 'purged'; 
                        optimizeAndRenderPage(p);
                    }
                }
            }
        }

        async function renderThumbnail(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 0.30 }); 

                const thumbBox = document.createElement('div');
                thumbBox.className = 'thumb-box';
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                thumbBox.appendChild(canvas);

                const label = document.createElement('div');
                label.className = 'thumb-label'; label.innerText = pageNum;
                thumbBox.appendChild(label);

                sidebarThumbnails.appendChild(thumbBox);
                thumbElements[pageNum - 1] = thumbBox;

                thumbBox.addEventListener('click', () => {
                    playPaperSound();
                    currentId = pageNum - 1;
                    localStorage.setItem('yatas_last_page', currentId);
                    resetZoom();
                    updateBookDisplay();
                });

                await page.render({ canvasContext: context, viewport: viewport }).promise;
            } catch (err) { console.error(err); }
        }

        async function loadPDF(url) {
            try {
                pdfDoc = await pdfjsLib.getDocument(url).promise;
                const totalPages = pdfDoc.numPages;
                pages = new Array(totalPages);
                thumbElements = new Array(totalPages);

                // İlk yüklemede kullanıcının bulunduğu pencereyi anında bas
                const startRenderPage = currentId + 1;
                await optimizeAndRenderPage(startRenderPage);

                globalLoading.style.display = 'none';
                zoomContainer.style.display = 'block';
                updateBookDisplay();

                // Arka plan işçilerini ayağa kaldır
                runPredictiveCachePipeline();

                // Küçük resimleri yükle
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    renderThumbnail(pageNum).then(() => {
                        if (pageNum - 1 === currentId && thumbElements[currentId]) {
                            thumbElements[currentId].classList.add('active-thumb');
                        }
                    });
                }
            } catch (error) {
                globalLoading.style.display = 'flex';
                globalLoading.innerText = "Error loading PDF file. Please check file paths.";
                console.error(error);
            }
        }

        function updateBookDisplay() {
            const total = pages.length;
            if (total === 0) return;

            pages.forEach((page, index) => {
                if (!page) return;
                if (index === currentId) {
                    page.className = 'page active-page';
                    resizeBookToFit(page.pdfViewport);
                } else if (index < currentId) {
                    page.className = 'page turn-next';
                } else {
                    page.className = 'page turn-prev';
                }
            });

            thumbElements.forEach((thumb, index) => {
                if (!thumb) return;
                if (index === currentId) {
                    thumb.classList.add('active-thumb');
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else { thumb.classList.remove('active-thumb'); }
            });

            document.getElementById('prevBtn').disabled = (currentId === 0);
            document.getElementById('nextBtn').disabled = (currentId >= total - 1);
            gotoInput.value = currentId + 1;
            document.getElementById('pageIndicator').innerText = `/ ${total}`;
        }

        function flipNext() { 
            if (currentId < pages.length - 1) { 
                playPaperSound();
                currentId++; 
                localStorage.setItem('yatas_last_page', currentId);
                resetZoom(); 
                runPredictiveCachePipeline();
                updateBookDisplay(); 
            } 
        }
        
        function flipPrev() { 
            if (currentId > 0) { 
                playPaperSound();
                currentId--; 
                localStorage.setItem('yatas_last_page', currentId);
                resetZoom(); 
                runPredictiveCachePipeline();
                updateBookDisplay(); 
            } 
        }
        
        function resetZoom() { scale = 1; posX = 0; posY = 0; updateTransform(); }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        document.getElementById('zoneLeft').addEventListener('click', (e) => { if (scale > 1) return; e.stopPropagation(); flipPrev(); });
        document.getElementById('zoneRight').addEventListener('click', (e) => { if (scale > 1) return; e.stopPropagation(); flipNext(); });

        gotoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let targetPage = parseInt(gotoInput.value);
                if (!isNaN(targetPage) && targetPage >= 1 && targetPage <= pages.length) {
                    playPaperSound();
                    currentId = targetPage - 1; 
                    localStorage.setItem('yatas_last_page', currentId);
                    resetZoom(); 
                    runPredictiveCachePipeline();
                    updateBookDisplay(); 
                    gotoInput.blur();
                } else { gotoInput.value = currentId + 1; }
            }
        });

        scene.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) { scale = Math.min(scale + 0.2, 5); } else { scale = Math.max(scale - 0.2, 1); }
            if (scale === 1) { posX = 0; posY = 0; }
            updateTransform();
        });

        scene.addEventListener('mousedown', (e) => {
            if (scale === 1 || e.target.closest('.nav-overlay-zone')) return;
            isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', (e) => { if (!isDragging) return; posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); });
        window.addEventListener('mouseup', () => { isDragging = false; });

        document.getElementById('zoomInBtn').addEventListener('click', () => { scale = Math.min(scale + 0.5, 5); updateTransform(); });
        document.getElementById('zoomOutBtn').addEventListener('click', () => { scale = Math.max(scale - 0.5, 1); if(scale===1){posX=0;posY=0;} updateTransform(); });
        document.getElementById('nextBtn').addEventListener('click', flipNext);
        document.getElementById('prevBtn').addEventListener('click', flipPrev);

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; 
            if (e.key === "ArrowRight" || e.key === " ") flipNext();
            if (e.key === "ArrowLeft") flipPrev();
        });

        window.addEventListener('resize', () => { if (pages[currentId]) updateBookDisplay(); });

        // AUTO RESUME ENGINE TRIGGER (ENGLISH CONTROLLER)
        window.onload = () => {
            buildSidebarMenu();
            
            const savedPresentation = localStorage.getItem('yatas_last_presentation');
            const savedPage = localStorage.getItem('yatas_last_page');

            if (savedPresentation !== null && presentations[savedPresentation]) {
                const targetPageIdx = savedPage !== null ? parseInt(savedPage) : 0;
                
                // İngilizce Toast Bildirimi tetikle
                const toast = document.getElementById('resumeToast');
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 4000);

                switchPresentation(parseInt(savedPresentation), targetPageIdx);
            } else {
                switchPresentation(0, 0); 
            }
        };
    </script>
