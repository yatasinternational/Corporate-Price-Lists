<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PDF Link Destekli Katalog</title>
    <!-- PDF.js Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #book {
            position: relative;
            width: 800px; /* Kataloğunuzun boyutlarına göre güncelleyebilirsiniz */
            height: 600px;
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Sayfa Kapsayıcı Ayarları */
        .page {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            opacity: 0;
            display: none;
        }

        /* Canvas Sayfa İçine Tam Otursun */
        .page canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- ŞEFFAF LİNK KATMANI (ANOTASYON) CSS AYARLARI --- */
        .annotationLayer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 1;
            line-height: 1;
            pointer-events: auto; /* Tıklamaları algılaması için */
            z-index: 2;
        }

        /* PDF.js tarafından üretilen link etiketlerinin şeffaf olması */
        .annotationLayer .linkAnnotation > a {
            position: absolute;
            font-size: 1em;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background-color: rgba(255, 255, 255, 0); /* Tamamen şeffaf */
            transition: background-color 0.2s;
        }

        /* Fareyle linkin üzerine gelindiğinde kullanıcının anlaması için hafif mavi tonu */
        .annotationLayer .linkAnnotation > a:hover {
            background-color: rgba(0, 40, 112, 0.15); 
        }
    </style>
</head>
<body>

    <div id="book">
        <!-- Sayfalar dinamik olarak buraya eklenecek -->
    </div>

    <script>
        // PDF.js worker yolunu tanımlıyoruz
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfUrl = 'katalog.pdf'; // Sizin PDF dosyanızın yolu
        const book = document.getElementById('book');
        
        let pdfDoc = null;
        let pages = [];
        let currentPage = 1;

        // PDF'i yükle
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            pdfDoc = pdf;
            renderAllPages();
        }).catch(err => {
            console.error("PDF yüklenirken hata oluştu: ", err);
        });

        // Tüm sayfaları sırayla oluştur
        async function renderAllPages() {
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                await renderPage(i);
            }
            // İlk sayfayı göstererek başlat
            showPage(1);
        }

        // --- GÜNCELLENEN RENDERPAGE FONKSİYONU ---
        async function renderPage(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                
                // Kaliteli render için scale: 2.0 idealdir, CSS ile kutuya sığdırılır
                const viewport = page.getViewport({ scale: 2.0 });

                // Sayfa kapsayıcı div
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.id = 'page-' + pageNum;
                
                // Çizim yapılacak Canvas
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; 
                canvas.width = viewport.width;

                pageDiv.appendChild(canvas);
                book.appendChild(pageDiv);

                // Canvas üzerine çizim yapma işlemi
                const renderTask = page.render({ canvasContext: context, viewport: viewport });
                pages[pageNum - 1] = pageDiv;

                await renderTask.promise;

                // --- LİNK KATMANININ ÇEKİLMESİ VE EKLENMESİ ---
                const annotations = await page.getAnnotations();
                if (annotations.length > 0) {
                    const annotationLayerDiv = document.createElement('div');
                    annotationLayerDiv.className = 'annotationLayer';
                    
                    // PDF.js dahili motoruyla linkleri koordinatlarına göre basıyoruz
                    pdfjsLib.AnnotationLayer.render({
                        viewport: viewport,
                        div: annotationLayerDiv,
                        annotations: annotations,
                        page: page,
                        linkService: {
                            navigateTo: (dest) => console.log("İç Bağlantı:", dest),
                            getDestinationHash: (dest) => "#",
                            getAnchorUrl: (hash) => "#",
                            setHash: (hash) => {},
                            executeNamedAction: (action) => {}
                        },
                        downloadManager: null
                    });
                    
                    pageDiv.appendChild(annotationLayerDiv);
                }

            } catch (err) { 
                console.error("Sayfa render hatası (" + pageNum + "):", err); 
            }
        }

        // Basit Sayfa Gösterme Fonksiyonu (Kendi yapınıza göre düzenleyebilirsiniz)
        function showPage(pageNum) {
            pages.forEach((page, index) => {
                if (index === (pageNum - 1)) {
                    page.style.display = 'block';
                    page.style.opacity = 1;
                } else {
                    page.style.display = 'none';
                    page.style.opacity = 0;
                }
            });
            currentPage = pageNum;
        }

        // Kendi kullandığınız sayfa çevirme (Turn.js veya custom script) 
        // entegrasyonlarını bu yapının üzerine kurmaya devam edebilirsiniz.
    </script>
</body>
</html>
