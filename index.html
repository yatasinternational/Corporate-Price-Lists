<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yataş Group - Corporate Prıce Lısts</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: url('image_26c6be.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        #globalLoading { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #070d22; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; letter-spacing: 1px;
        }

        .portal-wrapper { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

        /* SOL PANEL */
        .sidebar-nav {
            width: 320px;
            background: #002870;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            z-index: 200;
            overflow-y: auto;
        }

        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .logo-container {
            width: 100%;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .logo-container img { max-width: 100%; height: auto; display: block; }

        .brand-subtitle {
            font-size: 11px;
            color: #a4c2f4;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        .menu-section-title {
            font-size: 13px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 15px;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #ffffff;
        }

        .deck-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

        .deck-btn {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #ffffff;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.23s ease-in-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .deck-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateX(4px); }
        .deck-btn.active-deck { background: #ffffff; border-color: #ffffff; color: #002870; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }

        /* WORKSPACE */
        .workspace { flex: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; position: relative; background: rgba(7, 13, 34, 0.35); }
        .main-container { display: flex; width: 98%; flex: 1; overflow: hidden; gap: 15px; }
        .scene { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .pan-zoom-container { position: absolute; display: none; cursor: grab; transform-origin: center center; z-index: 10; }
        
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; display: none; }
        .page.active-page { display: block; opacity: 1; }
        canvas { width: 100% !important; height: 100% !important; display: block; box-shadow: 0 25px 65px rgba(0,0,0,0.8); border-radius: 6px; }

        .nav-overlay-zone { position: absolute; top: 0; height: 100%; width: 100px; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .left-zone { left: 0; } .right-zone { right: 0; }
        .arrow-btn { width: 50px; height: 50px; background: rgba(0, 0, 0, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; opacity: 0.35; transition: all 0.25s; }
        .arrow-btn:hover { opacity: 1; background: #ffffff; color: #000; }

        .sidebar-thumbnails { width: 200px; background: rgba(0, 40, 112, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 15px 10px; backdrop-filter: blur(15px); }
        .thumb-box { position: relative; width: 92%; cursor: pointer; border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 6px; overflow: hidden; opacity: 0.5; }
        .thumb-box.active-thumb { border-color: #ffffff; opacity: 1; }
        .thumb-label { position: absolute; bottom: 4px; right: 6px; background: rgba(0,0,0,0.8); color: #fff; font-size: 10px; padding: 1px 5px; }

        .bottom-bar-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 10px; }
        .controls { display: flex; align-items: center; gap: 15px; background: rgba(0, 40, 112, 0.85); padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.15); }
        .bottom-bar-area button { padding: 8px 18px; font-size: 12px; font-weight: bold; cursor: pointer; background: #fff; color: #002870; border: none; border-radius: 25px; }
        .goto-input { width: 40px; padding: 3px 5px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4); color: #fff; text-align: center; }
        .hint { font-size: 12px; color: #ffffff; font-weight: 500; }
    </style>
</head>
<body>

    <div id="globalLoading">Yataş Group Price Catalogues are loading..</div>
    
    <div class="portal-wrapper">
        <div class="sidebar-nav">
            <div class="logo-container"><img src="image_26c641.png" alt="Yataş Grup Logo"></div>
            <div class="brand-subtitle">Corporate Prıce Lısts</div>
            
            <div class="menu-section-title">Catalogues</div>
            <ul class="deck-list" id="cataloguesList"></ul>

            <div class="menu-section-title">Download Lınks</div>
            <ul class="deck-list" id="downloadlinks"></ul>
        </div>

        <div class="workspace">
            <div class="main-container" id="mainContainer">
                <div class="scene" id="scene">
                    <div id="zoomContainer" class="pan-zoom-container">
                        <div id="book" class="book"></div>
                    </div>
                    <div class="nav-overlay-zone left-zone" id="zoneLeft"><div class="arrow-btn" id="overlayPrevBtn">&#10094;</div></div>
                    <div class="nav-overlay-zone right-zone" id="zoneRight"><div class="arrow-btn" id="overlayNextBtn">&#10095;</div></div>
                </div>
                <div class="sidebar-thumbnails" id="sidebarThumbnails"></div>
            </div>

            <div class="bottom-bar-area">
                <div class="controls">
                    <button id="prevBtn" disabled>◀ Previous</button>
                    <div class="goto-container">
                        <input type="text" id="gotoInput" class="goto-input" value="1">
                        <span id="pageIndicator">/ 0</span>
                    </div>
                    <button id="nextBtn">Next ▶</button>
                    <button id="zoomInBtn">🔍 +</button>
                    <button id="zoomOutBtn">🔍 -</button>
                </div>
                <div class="hint">Use your mouse wheel to zoom in/out on the slide area.</div>
            </div>
        </div>
    </div>

    <script>
        const presentationData = {
            catalogues: [
                { title: "Yataş Bedding July 2026 USD", url: "BEDDING_JULY2026_DOLAR_HIGH.pdf" },
                { title: "Yataş Bedding July 2026 EUR", url: "BEDDING_JULY2026_EURO_HIGH.pdf" },
            ],
            downloadlinks: [
                { title: "Yataş Bedding July 2026 USD", url: "https://we.tl/t-hHbsYtkAQv63LRYm" },
		{ title: "Yataş Bedding July 2026 EUR", url: "https://we.tl/t-xABOnqmf2pMj3dhK" }
            ]
        };

        const presentations = [...presentationData.catalogues, ...presentationData.downloadlinks];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentId = 0, pages = [], thumbElements = [], pdfDoc = null;
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

        const zoomContainer = document.getElementById('zoomContainer'), book = document.getElementById('book'), scene = document.getElementById('scene'), sidebarThumbnails = document.getElementById('sidebarThumbnails'), gotoInput = document.getElementById('gotoInput'), cataloguesList = document.getElementById('cataloguesList'), downloadlinks = document.getElementById('downloadlinks'), globalLoading = document.getElementById('globalLoading');

        function buildSidebarMenu() {
            cataloguesList.innerHTML = "";
            downloadlinks.innerHTML = "";

            presentationData.catalogues.forEach((deck, idx) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `deck-btn ${idx === 0 ? 'active-deck' : ''}`;
                btn.innerText = deck.title;
                btn.addEventListener('click', () => switchPresentation(idx));
                li.appendChild(btn);
                cataloguesList.appendChild(li);
            });

            presentationData.downloadlinks.forEach((deck) => {
                const li = document.createElement('li');
                const btn = document.createElement('a');
                btn.className = 'deck-btn';
                btn.innerText = deck.title;
                btn.href = deck.url;
                btn.setAttribute('download', '');
                btn.style.textDecoration = 'none';
                li.appendChild(btn);
                downloadlinks.appendChild(li);
            });
        }

        async function switchPresentation(index) {
            const buttons = document.querySelectorAll('#cataloguesList .deck-btn');
            buttons.forEach((b, i) => b.classList.toggle('active-deck', i === index));

            globalLoading.style.display = 'flex';
            globalLoading.innerText = `Loading "${presentationData.catalogues[index].title}"...`;

            book.innerHTML = '';
            sidebarThumbnails.innerHTML = '';
            pages = [];
            thumbElements = [];
            currentId = 0;
            resetZoom();

            await loadPDF(presentationData.catalogues[index].url);
        }

        function resizeBookToFit(viewport) {
            const sceneW = scene.clientWidth, sceneH = scene.clientHeight;
            const idealScale = Math.min((sceneW * 0.94) / viewport.width, (sceneH * 0.90) / viewport.height);
            book.style.width = Math.floor(viewport.width * idealScale) + 'px';
            book.style.height = Math.floor(viewport.height * idealScale) + 'px';
        }

        async function renderPage(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 2.0 });
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                pageDiv.appendChild(canvas);
                book.appendChild(pageDiv);
                pages[pageNum - 1] = pageDiv;
                pageDiv.pdfViewport = page.getViewport({ scale: 1.0 });
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                updateBookDisplay();
            } catch (err) { console.error(err); }
        }

        async function renderThumbnail(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 0.35 });
                const thumbBox = document.createElement('div');
                thumbBox.className = 'thumb-box';
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                thumbBox.appendChild(canvas);
                const label = document.createElement('div');
                label.className = 'thumb-label'; label.innerText = pageNum;
                thumbBox.appendChild(label);
                sidebarThumbnails.appendChild(thumbBox);
                thumbElements[pageNum - 1] = thumbBox;
                thumbBox.addEventListener('click', () => { currentId = pageNum - 1; resetZoom(); updateBookDisplay(); });
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
            } catch (err) { console.error(err); }
        }

        async function loadPDF(url) {
            try {
                pdfDoc = await pdfjsLib.getDocument(url).promise;
                pages = new Array(pdfDoc.numPages);
                thumbElements = new Array(pdfDoc.numPages);
                await renderPage(1);
                globalLoading.style.display = 'none';
                zoomContainer.style.display = 'block';
                for (let i = 1; i <= pdfDoc.numPages; i++) { renderPage(i); renderThumbnail(i); }
            } catch (err) { globalLoading.innerText = "Error loading PDF."; console.error(err); }
        }

        function updateBookDisplay() {
            pages.forEach((p, i) => p && p.classList.toggle('active-page', i === currentId));
            thumbElements.forEach((t, i) => t && t.classList.toggle('active-thumb', i === currentId));
            document.getElementById('prevBtn').disabled = (currentId === 0);
            document.getElementById('nextBtn').disabled = (currentId >= pages.length - 1);
            gotoInput.value = currentId + 1;
            document.getElementById('pageIndicator').innerText = `/ ${pages.length}`;
        }

        function flipNext() { if (currentId < pages.length - 1) { currentId++; resetZoom(); updateBookDisplay(); } }
        function flipPrev() { if (currentId > 0) { currentId--; resetZoom(); updateBookDisplay(); } }
        function resetZoom() { scale = 1; posX = 0; posY = 0; zoomContainer.style.transform = `translate(0,0) scale(1)`; }
        
        scene.addEventListener('wheel', (e) => { e.preventDefault(); scale = e.deltaY < 0 ? Math.min(scale + 0.2, 5) : Math.max(scale - 0.2, 1); zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; });
        document.getElementById('nextBtn').addEventListener('click', flipNext);
        document.getElementById('prevBtn').addEventListener('click', flipPrev);
        
        window.onload = () => { buildSidebarMenu(); loadPDF(presentationData.catalogues[0].url); };
    </script>
</body>
</html>
