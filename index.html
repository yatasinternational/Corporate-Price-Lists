<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yataş Group - Corporate Price Lists</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: url('image_26c6be.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        #globalLoading { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #070d22; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; letter-spacing: 1px;
        }

        .portal-wrapper { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

        .sidebar-nav {
            width: 320px; background: #002870; border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; padding: 20px; box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            z-index: 200; overflow-y: auto;
        }

        .logo-container {
            width: 100%; background: #ffffff; padding: 15px; border-radius: 6px;
            display: flex; justify-content: center; align-items: center; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); flex-shrink: 0;
        }
        .logo-container img { max-width: 100%; height: auto; }

        .brand-subtitle {
            font-size: 11px; color: #a4c2f4; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 12px;
        }

        .menu-section-title {
            font-size: 13px; color: #ffffff; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; margin-top: 15px; margin-bottom: 10px; padding-left: 5px;
            border-left: 3px solid #ffffff;
        }

        .deck-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

        .deck-btn {
            width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; color: #ffffff;
            text-align: left; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.23s;
        }
        .deck-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateX(4px); }
        .deck-btn.active-deck { background: #ffffff; color: #002870; }

        /* WORKSPACE & PDF */
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 20px 0; background: rgba(7, 13, 34, 0.35); }
        .main-container { display: flex; width: 98%; flex: 1; overflow: hidden; gap: 15px; }
        .scene { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        
        .pan-zoom-container { position: absolute; cursor: grab; transform-origin: center center; z-index: 10; }
        
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; display: none; }
        .page.active-page { display: block; opacity: 1; }

        canvas { width: 100% !important; height: 100% !important; display: block; box-shadow: 0 25px 65px rgba(0,0,0,0.8); }

        /* Link Katmanı */
        .annotationLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .annotationLayer > section > a:hover { background: rgba(255, 255, 255, 0.3); }

        .nav-overlay-zone { position: absolute; top: 0; height: 100%; width: 100px; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .left-zone { left: 0; } .right-zone { right: 0; }
        
        .arrow-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.35; }
        
        .sidebar-thumbnails { width: 200px; background: rgba(0, 40, 112, 0.4); border-radius: 10px; overflow-y: auto; padding: 15px 10px; }
        .thumb-box { margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; opacity: 0.5; }
        .thumb-box.active-thumb { border-color: #fff; opacity: 1; }

        .bottom-bar-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .controls { display: flex; align-items: center; gap: 15px; background: rgba(0, 40, 112, 0.85); padding: 10px 25px; border-radius: 50px; }
        button { padding: 8px 18px; cursor: pointer; border-radius: 25px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="globalLoading">Yataş Group Price Catalogues..</div>
    
    <div class="portal-wrapper">
        <div class="sidebar-nav">
            <div class="logo-container"><img src="image_26c641.png" alt="Yataş Grup Logo"></div>
            <div class="brand-subtitle">Corporate Price Lists</div>
            <div class="menu-section-title">Catalogues</div>
            <ul class="deck-list" id="cataloguesList"></ul>
            <div class="menu-section-title">Download Lınks</div>
            <ul class="deck-list" id="downloadlinks"></ul>
        </div>

        <div class="workspace">
            <div class="main-container">
                <div class="scene" id="scene">
                    <div id="zoomContainer" class="pan-zoom-container">
                        <div id="book" class="book"></div>
                    </div>
                    <div class="nav-overlay-zone left-zone" id="zoneLeft"><div class="arrow-btn">&#10094;</div></div>
                    <div class="nav-overlay-zone right-zone" id="zoneRight"><div class="arrow-btn">&#10095;</div></div>
                </div>
                <div class="sidebar-thumbnails" id="sidebarThumbnails"></div>
            </div>

            <div class="bottom-bar-area">
                <div class="controls">
                    <button id="prevBtn">◀ Previous</button>
                    <input type="text" id="gotoInput" style="width:40px; text-align:center;" value="1">
                    <span id="pageIndicator">/ 0</span>
                    <button id="nextBtn">Next ▶</button>
                    <button id="zoomInBtn">🔍 +</button>
                    <button id="zoomOutBtn">🔍 -</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const presentationData = {
            catalogues: [
                { title: "Yataş Bedding July 2026 USD", url: "BEDDING_JULY2026_DOLAR_HIGH.pdf" },
                { title: "Yataş Bedding July 2026 EUR", url: "BEDDING_JULY2026_EURO_HIGH.pdf" },
            ],
            downloadlinks: [
                { title: "Yataş Bedding Export Price List", url: "Yataş Bedding Export Price List.pdf" }
            ]
        };

        const presentations = [...presentationData.catalogues, ...presentationData.downloadlinks];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentId = 0, pages = [], pdfDoc = null, scale = 1, posX = 0, posY = 0, isDragging = false;
        const book = document.getElementById('book'), scene = document.getElementById('scene'), zoomContainer = document.getElementById('zoomContainer');

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 2.0 });
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height; canvas.width = viewport.width;
            pageDiv.appendChild(canvas);
            book.appendChild(pageDiv);

            await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;

            // Link Katmanı Entegrasyonu
            const annotations = await page.getAnnotations();
            const annoDiv = document.createElement('div');
            annoDiv.className = 'annotationLayer';
            pdfjsLib.AnnotationLayer.render({
                viewport: viewport.clone({ dontFlip: true }),
                div: annoDiv,
                annotations: annotations,
                page: page
            });
            pageDiv.appendChild(annoDiv);

            pageDiv.pdfViewport = page.getViewport({ scale: 1.0 });
            pages[pageNum - 1] = pageDiv;
            updateBookDisplay();
        }

        async function loadPDF(url) {
            book.innerHTML = ''; pages = [];
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            for (let i = 1; i <= pdfDoc.numPages; i++) await renderPage(i);
            document.getElementById('globalLoading').style.display = 'none';
        }

        function updateBookDisplay() {
            pages.forEach((p, i) => p.classList.toggle('active-page', i === currentId));
            document.getElementById('gotoInput').value = currentId + 1;
        }

        document.getElementById('nextBtn').onclick = () => { if(currentId < pages.length-1) {currentId++; updateBookDisplay();} };
        document.getElementById('prevBtn').onclick = () => { if(currentId > 0) {currentId--; updateBookDisplay();} };
        
        // Menü kurulumu
        const cataloguesList = document.getElementById('cataloguesList');
        presentationData.catalogues.forEach((d, i) => {
            const btn = document.createElement('button');
            btn.className = 'deck-btn'; btn.innerText = d.title;
            btn.onclick = () => loadPDF(d.url);
            cataloguesList.appendChild(btn);
        });

        window.onload = () => loadPDF(presentations[0].url);
    </script>
</body>
</html>
