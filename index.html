<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yataş Group - Corporate Prıce Lısts</title>
    
    <!-- PDF.js Çekirdek Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #111b31;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        #globalLoading { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #070d22; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; letter-spacing: 1px;
        }

        .portal-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* SOL MENU */
        .sidebar-nav {
            width: 320px;
            background: #002870; /* Yataş Kurumsal Lacivert */
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            z-index: 200;
            overflow-y: auto;
        }

        .logo-container {
            width: 100%;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .brand-subtitle {
            font-size: 11px;
            color: #a4c2f4;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        .menu-section-title {
            font-size: 13px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 15px;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #ffffff;
        }

        .deck-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .deck-btn {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #ffffff;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.23s ease-in-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .deck-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        .deck-btn.active-deck {
            background: #ffffff;
            border-color: #ffffff;
            color: #002870; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* WORKSPACE */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            position: relative;
            background: rgba(7, 13, 34, 0.35);
        }

        .main-container {
            display: flex;
            width: 98%;
            flex: 1;
            overflow: hidden;
            gap: 15px;
        }
        
        .scene {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Pan-Zoom kapsayıcısının varsayılan durumu grab'dir */
        .pan-zoom-container {
            position: absolute;
            display: none;
            cursor: grab;
            transform-origin: center center;
            will-change: transform;
            z-index: 10;
        }
        .pan-zoom-container:active { cursor: grabbing; }
        
        /* Linkin üzerine gelindiğinde grab mekanizmasını ezmek için kullanılacak class */
        .pan-zoom-container.link-hovered {
            cursor: default !important;
        }

        .book {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            display: none;
        }
        
        .page.active-page {
            display: block;
            opacity: 1;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            box-shadow: 0 25px 65px rgba(0,0,0,0.8);
            border-radius: 6px;
        }

        /* LİNK KATMANININ EN ÜSTE ÇIKMASI */
        .annotationLayer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 1;
            pointer-events: auto;
            z-index: 9999; /* Canvas ve pan alanının en üstüne çıkarttık */
            transform-origin: top left;
        }

        /* SAĞ PANEL: SLAYT ŞERİDİ */
        .sidebar-thumbnails {
            width: 200px;
            background: rgba(0, 40, 112, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px 10px;
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .sidebar-thumbnails::-webkit-scrollbar { width: 5px; }
        .sidebar-thumbnails::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .thumb-box {
            position: relative; width: 92%; cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 6px;
            overflow: hidden; transition: all 0.2s ease-in-out; opacity: 0.5;
            background: rgba(255, 255, 255, 0.05); flex-shrink: 0;
        }
        .thumb-box:hover { opacity: 0.8; border-color: rgba(255,255,255,0.5); }
        .thumb-box.active-thumb { border-color: #ffffff; opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,0.5); }
        .thumb-box canvas { width: 100% !important; height: auto !important; display: block; }

        .thumb-label {
            position: absolute; bottom: 4px; right: 6px;
            background: rgba(0,0,0,0.8); color: #fff; font-size: 10px;
            font-weight: bold; padding: 1px 5px; border-radius: 3px;
        }

        /* PREMİUM OK BÖLGELERİ */
        .nav-overlay-zone {
            position: absolute;
            top: 0; height: 100%; width: 100px;
            z-index: 900;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-overlay-zone.left-zone { left: 0; }
        .nav-overlay-zone.right-zone { right: 0; }

        .arrow-btn {
            width: 50px; height: 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px; cursor: pointer;
            opacity: 0.35; transition: all 0.25s ease-in-out;
            backdrop-filter: blur(5px);
            user-select: none;
        }
        .nav-overlay-zone:hover .arrow-btn { opacity: 0.75; }
        .arrow-btn:hover {
            opacity: 1 !important; transform: scale(1.1);
            background: #ffffff !important; color: #000000 !important;
        }
        
        /* ALT PANEL */
        .bottom-bar-area {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 6px;
            padding-top: 10px; flex-shrink: 0; z-index: 100;
        }

        .controls {
            display: flex; align-items: center; gap: 15px; 
            background: rgba(0, 40, 112, 0.85); padding: 10px 25px; border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15);
        }
        
        .bottom-bar-area button {
            padding: 8px 18px; font-size: 12px; font-weight: bold; cursor: pointer;
            background: #fff; color: #002870; border: none; border-radius: 25px;
            transition: all 0.2s;
        }
        .bottom-bar-area button:hover { background: #e5e5e5; }
        .bottom-bar-area button:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .goto-container { display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .goto-input {
            width: 40px; padding: 3px 5px; border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4);
            color: #fff; text-align: center; font-weight: bold;
        }
        #pageIndicator { color: #ffffff; }
        .hint { font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div id="globalLoading">Yataş Group Price Catalogues..</div>
    
    <div class="portal-wrapper">
        
        <!-- SOL PANEL -->
        <div class="sidebar-nav">
            <div class="logo-container">
                <div style="color:#002870; font-weight:bold; font-size:24px;">YATAŞ GROUP</div>
            </div>
            <div class="brand-subtitle">Corporate Price Lists</div>
            
            <div class="menu-section-title">Catalogues</div>
            <ul class="deck-list" id="cataloguesList"></ul>

            <div class="menu-section-title">Download Links</div>
            <ul class="deck-list" id="downloadlinks"></ul>
        </div>

        <!-- WORKSPACE -->
        <div class="workspace">
            <div class="main-container" id="mainContainer">
                <div class="scene" id="scene">
                    
                    <div id="zoomContainer" class="pan-zoom-container">
                        <div id="book" class="book"></div>
                    </div>

                    <div class="nav-overlay-zone left-zone" id="zoneLeft">
                        <div class="arrow-btn" id="overlayPrevBtn">&#10094;</div>
                    </div>

                    <div class="nav-overlay-zone right-zone" id="zoneRight">
                        <div class="arrow-btn" id="overlayNextBtn">&#10095;</div>
                    </div>

                </div>

                <div class="sidebar-thumbnails" id="sidebarThumbnails"></div>
            </div>

            <!-- KONTROLLER -->
            <div class="bottom-bar-area" id="bottomBarArea">
                <div class="controls">
                    <button id="prevBtn" disabled>◀ Previous</button>
                    <div class="goto-container">
                        <input type="text" id="gotoInput" class="goto-input" value="1">
                        <span id="pageIndicator">/ 0</span>
                    </div>
                    <button id="nextBtn">Next ▶</button>
                    <button id="zoomInBtn">🔍 +</button>
                    <button id="zoomOutBtn">🔍 -</button>
                </div>
                <div class="hint">Click links directly to open. Drag elsewhere to move the page.</div>
            </div>
        </div>

    </div>

    <script>
        const presentationData = {
            catalogues: [
                { title: "Yataş Bedding Export Price List", url: "Yatas Bedding Export Price List.pdf" }
            ],
            downloadlinks: []
        };

        const presentations = [...presentationData.catalogues, ...presentationData.downloadlinks];
        let currentId = 0; let pages = []; let thumbElements = []; let pdfDoc = null;
        let scale = 1; let posX = 0; let posY = 0; let isDragging = false; let startX; let startY;

        const zoomContainer = document.getElementById('zoomContainer');
        const book = document.getElementById('book');
        const scene = document.getElementById('scene');
        const sidebarThumbnails = document.getElementById('sidebarThumbnails');
        const gotoInput = document.getElementById('gotoInput');
        const cataloguesList = document.getElementById('cataloguesList');
        const globalLoading = document.getElementById('globalLoading');

        function buildSidebarMenu() {
            cataloguesList.innerHTML = "";
            let globalIdx = 0;
            presentationData.catalogues.forEach((deck) => {
                const currentIdx = globalIdx;
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `deck-btn ${currentIdx === 0 ? 'active-deck' : ''}`;
                btn.innerText = deck.title;
                btn.addEventListener('click', () => switchPresentation(currentIdx));
                li.appendChild(btn);
                cataloguesList.appendChild(li);
                globalIdx++;
            });
        }

        async function switchPresentation(index) {
            globalLoading.style.display = 'flex';
            book.innerHTML = ''; sidebarThumbnails.innerHTML = '';
            pages = []; thumbElements = []; currentId = 0; resetZoom();
            await loadPDF(presentations[index].url);
        }

        function resizeBookToFit(viewport) {
            const sceneW = scene.clientWidth; const sceneH = scene.clientHeight;
            const scaleX = (sceneW * 0.94) / viewport.width;
            const scaleY = (sceneH * 0.90) / viewport.height;
            const idealScale = Math.min(scaleX, scaleY);
            
            book.style.width = Math.floor(viewport.width * idealScale) + 'px';
            book.style.height = Math.floor(viewport.height * idealScale) + 'px';

            const activePageDiv = pages[currentId];
            if (activePageDiv) {
                const layer = activePageDiv.querySelector('.annotationLayer');
                if (layer) {
                    layer.style.transform = `scale(${idealScale / 2.0})`;
                    layer.style.width = viewport.width + 'px';
                    layer.style.height = viewport.height + 'px';
                }
            }
        }

        async function renderPage(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 2.0 });

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.style.position = 'relative';
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;

                pageDiv.appendChild(canvas);
                book.appendChild(pageDiv);

                pages[pageNum - 1] = pageDiv;
                pageDiv.pdfViewport = page.getViewport({ scale: 1.0 });

                await page.render({ canvasContext: context, viewport: viewport }).promise;

                // METİN TARAYICI KATMANI
                const textContent = await page.getTextContent();
                const annotationLayerDiv = document.createElement('div');
                annotationLayerDiv.className = 'annotationLayer';
                annotationLayerDiv.style.position = 'absolute';
                annotationLayerDiv.style.top = '0'; annotationLayerDiv.style.left = '0';
                annotationLayerDiv.style.transformOrigin = 'top left';

                textContent.items.forEach(item => {
                    if (item.str.includes("http") || item.str.includes("we.tl")) {
                        const urlMatch = item.str.match(/(https?:\/\/[^\s]+)/);
                        if (urlMatch) {
                            const actualUrl = urlMatch[0];
                            const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                            
                            const linkAnchor = document.createElement('a');
                            linkAnchor.href = actualUrl;
                            linkAnchor.target = '_blank';
                            linkAnchor.style.position = 'absolute';
                            
                            linkAnchor.style.left = `${tx[4]}px`;
                            linkAnchor.style.top = `${tx[5] - (item.height * 1.8)}px`; 
                            linkAnchor.style.width = `${item.width * 2.0}px`;
                            linkAnchor.style.height = `${item.height * 2.2}px`;
                            linkAnchor.style.display = 'block';
                            
                            // ÇAKIŞMAYI ÖNLEYEN KRİTİK AYARLAR:
                            linkAnchor.style.cursor = 'pointer';
                            linkAnchor.style.zIndex = '99999';

                            // Linkin üstündeyken grab fonksiyonunu kapatıp cursor'ı pointer yapıyoruz
                            linkAnchor.addEventListener('mouseenter', (e) => {
                                zoomContainer.classList.add('link-hovered');
                                linkAnchor.style.backgroundColor = 'rgba(0, 40, 112, 0.25)';
                            });
                            
                            linkAnchor.addEventListener('mouseleave', () => {
                                zoomContainer.classList.remove('link-hovered');
                                linkAnchor.style.backgroundColor = 'transparent';
                            });

                            // Tıklama anında pan sürüklemesini engelliyoruz ki tarayıcı linki açsın
                            linkAnchor.addEventListener('mousedown', (e) => {
                                e.stopPropagation();
                            });

                            annotationLayerDiv.appendChild(linkAnchor);
                        }
                    }
                });

                if (annotationLayerDiv.children.length > 0) {
                    pageDiv.appendChild(annotationLayerDiv);
                }

                updateBookDisplay();
            } catch (err) { console.error(err); }
        }

        async function renderThumbnail(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 0.35 });
                const thumbBox = document.createElement('div');
                thumbBox.className = 'thumb-box';
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                thumbBox.appendChild(canvas);

                const label = document.createElement('div');
                label.className = 'thumb-label'; label.innerText = pageNum;
                thumbBox.appendChild(label);

                sidebarThumbnails.appendChild(thumbBox);
                thumbElements[pageNum - 1] = thumbBox;

                thumbBox.addEventListener('click', () => { currentId = pageNum - 1; resetZoom(); updateBookDisplay(); });
                await page.render({ canvasContext: context, viewport: viewport }).promise;
            } catch (err) { console.error(err); }
        }

        async function loadPDF(url) {
            try {
                pdfDoc = await pdfjsLib.getDocument(url).promise;
                const totalPages = pdfDoc.numPages;
                pages = new Array(totalPages);
                thumbElements = new Array(totalPages);

                for (let pageNum = 1; pageNum <= Math.min(3, totalPages); pageNum++) {
                    await renderPage(pageNum);
                }

                globalLoading.style.display = 'none';
                zoomContainer.style.display = 'block';
                updateBookDisplay();

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    renderThumbnail(pageNum).then(() => {
                        if (pageNum - 1 === currentId && thumbElements[currentId]) {
                            thumbElements[currentId].classList.add('active-thumb');
                        }
                    });
                    if (pageNum > 3) { renderPage(pageNum); }
                }
            } catch (error) {
                globalLoading.innerText = "PDF dosyası yüklenemedi.";
                console.error(error);
            }
        }

        function updateBookDisplay() {
            const total = pages.length; if (total === 0) return;

            pages.forEach((page, index) => {
                if (!page) return;
                if (index === currentId) {
                    page.classList.add('active-page');
                    resizeBookToFit(page.pdfViewport);
                } else { page.classList.remove('active-page'); }
            });

            thumbElements.forEach((thumb, index) => {
                if (!thumb) return;
                if (index === currentId) {
                    thumb.classList.add('active-thumb');
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else { thumb.classList.remove('active-thumb'); }
            });

            document.getElementById('prevBtn').disabled = (currentId === 0);
            document.getElementById('nextBtn').disabled = (currentId >= total - 1);
            gotoInput.value = currentId + 1;
            document.getElementById('pageIndicator').innerText = `/ ${total}`;
        }

        function flipNext() { if (currentId < pages.length - 1) { currentId++; resetZoom(); updateBookDisplay(); } }
        function flipPrev() { if (currentId > 0) { currentId--; resetZoom(); updateBookDisplay(); } }
        function resetZoom() { scale = 1; posX = 0; posY = 0; zoomContainer.classList.remove('link-hovered'); updateTransform(); }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        document.getElementById('zoneLeft').addEventListener('click', (e) => { if (scale > 1) return; flipPrev(); });
        document.getElementById('zoneRight').addEventListener('click', (e) => { if (scale > 1) return; flipNext(); });

        scene.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) { scale = Math.min(scale + 0.2, 5); } else { scale = Math.max(scale - 0.2, 1); }
            if (scale === 1) { posX = 0; posY = 0; } updateTransform();
        });

        scene.addEventListener('mousedown', (e) => {
            // Eğer fare bir linkin (A etiketi) üzerindeyse sürükleme tetiklenmesin
            if (scale === 1 || e.target.closest('.nav-overlay-zone') || zoomContainer.classList.contains('link-hovered')) return;
            isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', (e) => { if (!isDragging) return; posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); });
        window.addEventListener('mouseup', () => { isDragging = false; });

        document.getElementById('zoomInBtn').addEventListener('click', () => { scale = Math.min(scale + 0.5, 5); updateTransform(); });
        document.getElementById('zoomOutBtn').addEventListener('click', () => { scale = Math.max(scale - 0.5, 1); if(scale===1){posX=0;posY=0;} updateTransform(); });
        document.getElementById('nextBtn').addEventListener('click', flipNext);
        document.getElementById('prevBtn').addEventListener('click', flipPrev);

        window.addEventListener('resize', () => { if (pages[currentId]) updateBookDisplay(); });

        window.onload = () => {
            buildSidebarMenu();
            loadPDF(presentations[0].url);
        };
    </script>
</body>
</html>
